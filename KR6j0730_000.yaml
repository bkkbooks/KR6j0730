front:
  text: 請觀音經疏闡義鈔序此疏自智者演說章安記録古來人師無聞贊述既傳授道息後學往往有不知其名者知其名而未嘗披其卷者於乎斯文之未喪也一線爾吾不肖而實痛焉吾如默默則何以傳後遂因疾間輒約文敷義筆之為鈔凡二卷庶申明於大旨開發於童蒙也既成乃作序以言其由復作闡義之名以名之皇宋三葉登封之明年歲次己酉孟夏哉生明於南塔上方病中序
